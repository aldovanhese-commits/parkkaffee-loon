<!doctype html><html lang="nl"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"><meta name="theme-color" content="#0f172a">
<link rel="manifest" href="manifest.webmanifest"><link rel="apple-touch-icon" href="icon-192.png"><title>WorkTracker</title>
<style>
:root{--bg:#f6f7fb;--card:#fff;--ink:#101828;--muted:#667085;--line:#e6e8ef;--accent:#0f172a;--accent2:#2563eb;--green:#067647;--red:#b42318;--orange:#b54708;--blue:#175cd3;--shadow:0 10px 30px rgba(15,23,42,.08)}
@media(prefers-color-scheme:dark){:root{--bg:#090d14;--card:#111827;--ink:#f8fafc;--muted:#98a2b3;--line:#263244;--accent:#f8fafc;--accent2:#60a5fa;--shadow:0 10px 35px rgba(0,0,0,.35)} input,select,textarea{color-scheme:dark}}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,Arial,sans-serif;background:var(--bg);color:var(--ink)}body{padding:env(safe-area-inset-top) 14px calc(86px + env(safe-area-inset-bottom));}button,input,select,textarea{font:inherit}button{border:0;border-radius:16px;background:var(--accent);color:var(--bg);font-weight:750;padding:13px 14px;cursor:pointer}button.secondary{background:var(--card);color:var(--ink);border:1px solid var(--line)}button.ghost{background:transparent;color:var(--accent2);padding:8px}button.danger{background:#fee4e2;color:var(--red)}input,select,textarea{width:100%;min-width:0;border:1px solid var(--line);background:var(--card);color:var(--ink);border-radius:14px;padding:12px;outline:none}label{display:block;color:var(--muted);font-size:12px;font-weight:700;margin:10px 0 6px}.app{max-width:820px;margin:auto}.top{position:sticky;top:0;z-index:4;background:linear-gradient(var(--bg) 82%,rgba(246,247,251,0));padding:12px 0 14px}.title{display:flex;justify-content:space-between;align-items:center;gap:10px}.title h1{font-size:30px;letter-spacing:-.8px;margin:0}.sub{color:var(--muted);font-size:13px}.tabs{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-top:14px}.tabs button{font-size:11px;padding:9px 4px;background:transparent;color:var(--muted);border:1px solid transparent}.tabs button.active{background:var(--card);color:var(--ink);border-color:var(--line);box-shadow:var(--shadow)}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.card{background:var(--card);border:1px solid var(--line);border-radius:24px;padding:16px;margin:10px 0;box-shadow:var(--shadow)}.kpi{min-height:88px}.kpi small{color:var(--muted);font-weight:700}.kpi b{display:block;font-size:24px;letter-spacing:-.6px;margin-top:8px}.span2{grid-column:span 2}.list{display:flex;flex-direction:column;gap:10px}.item{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:14px;box-shadow:0 3px 12px rgba(15,23,42,.04)}.itemTop{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}.item h3{font-size:16px;margin:0}.meta{color:var(--muted);font-size:13px;line-height:1.45;margin-top:5px}.amount{font-weight:800;white-space:nowrap}.pill{display:inline-flex;align-items:center;gap:5px;padding:5px 9px;border-radius:999px;background:#eef4ff;color:var(--blue);font-size:12px;font-weight:800}.pill.green{background:#dcfae6;color:var(--green)}.pill.orange{background:#fef0c7;color:var(--orange)}.pill.red{background:#fee4e2;color:var(--red)}.actions{display:flex;gap:8px;margin-top:12px}.actions button{padding:9px 10px;font-size:13px}.sectionTitle{display:flex;align-items:center;justify-content:space-between;margin:18px 3px 8px}.sectionTitle h2{font-size:19px;margin:0}.hidden{display:none!important}.empty{color:var(--muted);text-align:center;padding:22px}.fab{position:fixed;right:18px;bottom:calc(74px + env(safe-area-inset-bottom));width:60px;height:60px;border-radius:22px;background:var(--accent2);color:white;display:grid;place-items:center;font-size:32px;box-shadow:0 14px 35px rgba(37,99,235,.35);z-index:6}.bottomNav{position:fixed;left:0;right:0;bottom:0;padding:8px 10px calc(8px + env(safe-area-inset-bottom));background:rgba(246,247,251,.82);backdrop-filter:blur(18px);border-top:1px solid var(--line);z-index:5}.bottomNavInner{max-width:820px;margin:auto;display:grid;grid-template-columns:repeat(5,1fr);gap:4px}.bottomNav button{background:transparent;color:var(--muted);font-size:11px;padding:7px 2px;border-radius:14px}.bottomNav button.active{color:var(--accent2);background:rgba(37,99,235,.10)}.icon{display:block;font-size:20px;margin-bottom:2px}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.modal{position:fixed;inset:0;background:rgba(2,6,23,.45);z-index:20;display:flex;align-items:flex-end;justify-content:center}.sheet{width:100%;max-width:820px;max-height:92vh;overflow:auto;background:var(--bg);border-radius:28px 28px 0 0;padding:18px 14px calc(18px + env(safe-area-inset-bottom));box-shadow:0 -20px 55px rgba(0,0,0,.25)}.sheetHead{display:flex;justify-content:space-between;align-items:center}.sheet h2{margin:0;font-size:22px}.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}.dayName{text-align:center;color:var(--muted);font-size:11px;font-weight:800;padding:4px}.day{aspect-ratio:1/1;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:6px;font-size:12px;position:relative}.day.today{outline:2px solid var(--accent2)}.dots{position:absolute;left:6px;right:6px;bottom:5px;display:flex;gap:4px;justify-content:center}.dot{width:7px;height:7px;border-radius:50%}.dot.done{box-shadow:0 0 0 1.5px var(--green)}.bar{height:9px;background:#e5e7eb;border-radius:9px;overflow:hidden}.bar>span{display:block;height:100%;background:var(--accent2);border-radius:9px}.miniChart{display:flex;align-items:flex-end;gap:7px;height:120px}.miniChart div{flex:1;background:var(--accent2);border-radius:8px 8px 3px 3px;min-height:4px;opacity:.85}.quickgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.timer{font-size:38px;font-weight:900;letter-spacing:-1px;margin:12px 0}.good{color:var(--green)}.bad{color:var(--red)}@media(max-width:390px){body{padding-left:10px;padding-right:10px}.title h1{font-size:28px}.card{border-radius:21px;padding:14px}.kpi b{font-size:21px}.row{gap:8px}.tabs{display:none}.bottomNav button{font-size:10px}.icon{font-size:18px}.sheet{padding-left:10px;padding-right:10px}}
</style></head><body><div class="app">
<header class="top"><div class="title"><div><h1>WorkTracker</h1><div class="sub">Planning & loon voor je shifts</div></div><button class="secondary" id="backupBtn">Backup</button></div><div class="tabs" id="tabs"></div></header>
<main id="view"></main></div><button class="fab" id="fab">+</button><nav class="bottomNav"><div class="bottomNavInner" id="nav"></div></nav><div id="modalRoot"></div>
<script>
const OLD={rate:15.30,shifts:[
{date:"2026-06-17",start:"09:00",end:"16:45",breakMin:60,note:"uit Excel",employer:"Parkkaffee"},{date:"2026-06-18",start:"09:00",end:"17:00",breakMin:60,note:"uit Excel",employer:"Parkkaffee"},{date:"2026-06-25",start:"09:00",end:"17:00",breakMin:60,note:"uit Excel",employer:"Parkkaffee"},{date:"2026-06-30",start:"09:00",end:"21:00",breakMin:120,note:"uit Excel",employer:"Parkkaffee"},
{date:"2025-07-17",start:"15:00",end:"01:00",breakMin:30,note:"uit Excel",employer:"Parkkaffee"},{date:"2025-07-20",start:"18:00",end:"00:15",breakMin:0,note:"uit Excel",employer:"Parkkaffee"},{date:"2025-07-23",start:"18:00",end:"23:30",breakMin:0,note:"uit Excel",employer:"Parkkaffee"},{date:"2025-07-24",start:"16:30",end:"00:10",breakMin:30,note:"uit Excel",employer:"Parkkaffee"},{date:"2025-07-25",start:"13:30",end:"22:00",breakMin:30,note:"uit Excel",employer:"Parkkaffee"},{date:"2025-07-29",start:"18:00",end:"23:30",breakMin:0,note:"uit Excel",employer:"Parkkaffee"},{date:"2025-07-30",start:"13:48",end:"00:40",breakMin:90,note:"uit Excel",employer:"Parkkaffee"},{date:"2025-07-31",start:"13:30",end:"00:30",breakMin:30,note:"uit Excel",employer:"Parkkaffee"},{date:"2025-08-01",start:"18:00",end:"23:15",breakMin:0,note:"uit Excel",employer:"Parkkaffee"},{date:"2025-08-10",start:"15:00",end:"21:00",breakMin:45,note:"uit Excel",employer:"Parkkaffee"},{date:"2025-08-12",start:"18:00",end:"00:15",breakMin:0,note:"uit Excel",employer:"Parkkaffee"},{date:"2025-08-14",start:"15:00",end:"00:15",breakMin:30,note:"uit Excel",employer:"Parkkaffee"},{date:"2025-08-15",start:"18:00",end:"22:00",breakMin:0,note:"uit Excel",employer:"Parkkaffee"},{date:"2025-08-27",start:"18:00",end:"00:10",breakMin:0,note:"uit Excel",employer:"Parkkaffee"},{date:"2025-08-29",start:"19:00",end:"00:30",breakMin:0,note:"uit Excel",employer:"Parkkaffee"}],payments:[{date:"2025-07-23",amount:226.24,note:"uit Excel"},{date:"2025-08-06",amount:74.24,note:"uit Excel"},{date:"2025-08-06",amount:646.91,note:"uit Excel"},{date:"2025-08-08",amount:49.87,note:"uit Excel"},{date:"2025-08-14",amount:74.24,note:"uit Excel"},{date:"2025-08-21",amount:268.67,note:"uit Excel"}]};
const fresh=()=>({settings:{rate:OLD.rate,employer:"Parkkaffee"},plans:[],shifts:OLD.shifts.map(x=>({...x,id:uid(),rate:x.date.startsWith('2025')?14.88:15.30})),payments:OLD.payments.map(x=>({...x,id:uid()})),active:null});
let state=load();let page=localStorage.getItem('wt_page')||'home';let calDate=new Date();
const PAGES=[['home','🏠','Home'],['planning','📅','Planning'],['shifts','⏱️','Shifts'],['pay','💳','Loon'],['stats','📊','Stats']];
const $=id=>document.getElementById(id), eur=n=>new Intl.NumberFormat('nl-BE',{style:'currency',currency:'EUR'}).format(n||0), num=n=>new Intl.NumberFormat('nl-BE',{maximumFractionDigits:2,minimumFractionDigits:2}).format(n||0);
function uid(){return Math.random().toString(36).slice(2,9)}function today(){return new Date().toISOString().slice(0,10)}function load(){let saved=localStorage.getItem('worktracker_v3'); if(saved) return JSON.parse(saved); let old=localStorage.getItem('pk_loon_v1'); if(old){try{let o=JSON.parse(old), first=Object.values(o)[0]; return {settings:{rate:first.rate||15.3,employer:'Parkkaffee'},plans:[],shifts:first.shifts.map(s=>({...s,id:uid(),rate:first.rate||15.3,employer:'Parkkaffee'})),payments:(first.payments||[]).map(p=>({...p,id:uid()})),active:null}}catch(e){}} return fresh()}
function save(){localStorage.setItem('worktracker_v3',JSON.stringify(state));localStorage.setItem('wt_page',page)}function minutes(t){let [h,m]=(t||'0:0').split(':').map(Number);return h*60+m}function hours(s){let a=minutes(s.start),b=minutes(s.end);if(b<a)b+=1440;return Math.max(0,(b-a-(+s.breakMin||0))/60)}function money(s){return hours(s)*(+s.rate||+state.settings.rate||0)}function dateFmt(d,opts={weekday:'short',day:'numeric',month:'short'}){return new Date(d+'T12:00').toLocaleDateString('nl-BE',opts)}function esc(s){return (s||'').replace(/[&<>\"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}
function totals(){let earned=state.shifts.reduce((a,s)=>a+money(s),0), paid=state.payments.reduce((a,p)=>a+(+p.amount||0),0), h=state.shifts.reduce((a,s)=>a+hours(s),0);return {earned,paid,due:earned-paid,h,avg:h?earned/h:0,days:state.shifts.length}}

// Slimme functie om de kleur per type werkgever te bepalen
function getEmpColor(emp) {
  let name = (emp || state.settings.employer || '').toLowerCase().trim();
  if (name.includes('park')) return '#db2777'; // Dieproze/Magenta voor Parkkaffee
  if (name.includes('kruid')) return '#2563eb'; // Blauw voor Kruidvat
  // Dynamische fallback mocht er een nieuwe werkgever bij komen
  let hash = 0;
  for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
  const colors = ['#7c3aed', '#059669', '#d97706', '#0891b2', '#4b5563'];
  return colors[Math.abs(hash) % colors.length];
}

function render(){save();renderNav();let v=$('view'); if(page==='home')v.innerHTML=home(); if(page==='planning')v.innerHTML=planning(); if(page==='shifts')v.innerHTML=shifts(); if(page==='pay')v.innerHTML=pay(); if(page==='stats')v.innerHTML=stats(); bindPage()}
function renderNav(){let html=PAGES.map(p=>`<button class="${page===p[0]?'active':''}" data-page="${p[0]}"><span class="icon">${p[1]}</span>${p[2]}</button>`).join('');$('nav').innerHTML=html;$('tabs').innerHTML=html;document.querySelectorAll('[data-page]').forEach(b=>b.onclick=()=>{page=b.dataset.page;render()})}
function home(){let t=totals(), next=state.plans.filter(p=>p.date>=today()).sort((a,b)=>(a.date+a.start).localeCompare(b.date+b.start))[0], todays=state.plans.filter(p=>p.date===today());return `<section class="grid"><div class="card kpi span2"><small>Nog te ontvangen</small><b class="${t.due>0?'bad':'good'}">${eur(t.due)}</b></div><div class="card kpi"><small>Totaal verdiend</small><b>${eur(t.earned)}</b></div><div class="card kpi"><small>Uren</small><b>${num(t.h)}u</b></div><div class="card kpi"><small>Gemiddeld</small><b>${eur(t.avg)}/u</b></div><div class="card kpi"><small>Geplande dagen</small><b>${state.plans.length}</b></div></section><section class="card"><div class="sectionTitle"><h2>Vandaag</h2></div>${state.active?activeBox():todays.length?todays.map(planCard).join(''):'<div class="empty">Vandaag niets gepland.</div>'}</section><section class="card"><h2>Volgende shift</h2>${next?planCard(next):'<div class="empty">Geen toekomstige planning.</div>'}</section>`}
function activeBox(){let a=state.active, elapsed=(Date.now()-a.startedAt)/3600000;return `<div class="timer">${num(elapsed)}u</div><div class="meta">Gestart om ${new Date(a.startedAt).toLocaleTimeString('nl-BE',{hour:'2-digit',minute:'2-digit'})}</div><div class="quickgrid" style="margin-top:12px"><button onclick="finishActive()">Shift beëindigen</button><button class="secondary" onclick="cancelActive()">Annuleer</button></div>`}
function planning(){return `<div class="sectionTitle"><h2>Planning</h2><button class="secondary" onclick="openPlan()">+ Dag</button></div>${calendar()}<div class="sectionTitle"><h2>Geplande dagen</h2></div><div class="list">${state.plans.slice().sort((a,b)=>(a.date+a.start).localeCompare(b.date+b.start)).map(planCard).join('')||'<div class="card empty">Nog niets gepland.</div>'}</div>`}

function calendar(){
  let y=calDate.getFullYear(),m=calDate.getMonth(),first=new Date(y,m,1),days=new Date(y,m+1,0).getDate(),start=(first.getDay()+6)%7;
  let cells='';
  for(let i=0;i<start;i++)cells+='<div></div>';
  for(let d=1;d<=days;d++){
    let ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    
    let p=state.plans.find(x=>x.date===ds), s=state.shifts.find(x=>x.date===ds);
    let click=p?`openPlan('${ds}','${p.id}')` : (s?`openShift('${s.id}')` : `openPlan('${ds}')`);
    
    let dotsHtml = '';
    if(p) {
      dotsHtml += `<span class="dot" style="background:${getEmpColor(p.employer)}" title="Gepland: ${esc(p.employer)}"></span>`;
    }
    if(s) {
      // Afgeronde shifts krijgen de bedrijfskleur met een subtiele 'done' ring eromheen
      dotsHtml += `<span class="dot done" style="background:${getEmpColor(s.employer)}" title="Gewerkt: ${esc(s.employer)}"></span>`;
    }
    
    cells+=`<div class="day ${ds===today()?'today':''}" onclick="${click}"><b>${d}</b><div class="dots">${dotsHtml}</div></div>`
  }
  return `<section class="card"><div class="itemTop"><button class="ghost" onclick="calDate.setMonth(calDate.getMonth()-1);render()">‹</button><h3>${first.toLocaleDateString('nl-BE',{month:'long',year:'numeric'})}</h3><button class="ghost" onclick="calDate.setMonth(calDate.getMonth()+1);render()">›</button></div><div class="calendar">${['Ma','Di','Wo','Do','Vr','Za','Zo'].map(x=>`<div class="dayName">${x}</div>`).join('')}${cells}</div></section>`
}

function planCard(p){
  let emp = p.employer||state.settings.employer;
  return `<div class="item"><div class="itemTop"><div><h3>${dateFmt(p.date)} <span class="pill orange">Gepland</span></h3><div class="meta">${p.start||'?'} → ${p.end||'?'} · <span style="color:${getEmpColor(emp)};margin-right:3px;">●</span><b>${esc(emp)}</b>${p.note?' · '+esc(p.note):''}</div></div></div><div class="actions"><button onclick="startPlan('${p.id}')">Start</button><button class="secondary" onclick="openPlan('${p.date}','${p.id}')">Bewerk</button><button class="danger" onclick="delPlan('${p.id}')">Verwijder</button></div></div>`
}
function shifts(){let sorted=state.shifts.slice().sort((a,b)=>(b.date+b.start).localeCompare(a.date+a.start));return `<div class="sectionTitle"><h2>Gewerkte shifts</h2><button class="secondary" onclick="openShift()">+ Shift</button></div><div class="list">${sorted.map(shiftCard).join('')||'<div class="card empty">Nog geen gewerkte shifts.</div>'}</div>`}
function shiftCard(s){
  let emp = s.employer||state.settings.employer;
  return `<div class="item"><div class="itemTop"><div><h3>${dateFmt(s.date)} <span class="pill green">Gewerkt</span></h3><div class="meta">${s.start} → ${s.end} · pauze ${s.breakMin||0} min · ${num(hours(s))}u<br><span style="color:${getEmpColor(emp)};margin-right:3px;">●</span><b>${esc(emp)}</b>${s.note?' · '+esc(s.note):''}</div></div><div class="amount">${eur(money(s))}</div></div><div class="actions"><button class="secondary" onclick="openShift('${s.id}')">Pas aan</button><button class="danger" onclick="delShift('${s.id}')">Verwijder</button></div></div>`
}
function pay(){let t=totals();return `<section class="grid"><div class="card kpi"><small>Verdienste</small><b>${eur(t.earned)}</b></div><div class="card kpi"><small>Betaald</small><b>${eur(t.paid)}</b></div><div class="card kpi span2"><small>Nog te ontvangen</small><b class="${t.due>0?'bad':'good'}">${eur(t.due)}</b></div></section><div class="sectionTitle"><h2>Betalingen</h2><button class="secondary" onclick="openPayment()">+ Betaling</button></div><div class="list">${state.payments.slice().sort((a,b)=>b.date.localeCompare(a.date)).map(paymentCard).join('')||'<div class="card empty">Nog geen betalingen.</div>'}</div>`}
function paymentCard(p){return `<div class="item"><div class="itemTop"><div><h3>${dateFmt(p.date)}</h3><div class="meta">${esc(p.note||'Betaling ontvangen')}</div></div><div class="amount">${eur(+p.amount||0)}</div></div><div class="actions"><button class="secondary" onclick="openPayment('${p.id}')">Bewerk</button><button class="danger" onclick="delPayment('${p.id}')">Verwijder</button></div></div>`}
function stats(){let by={};state.shifts.forEach(s=>{let k=s.date.slice(0,7);by[k]??={h:0,e:0};by[k].h+=hours(s);by[k].e+=money(s)});let keys=Object.keys(by).sort(), max=Math.max(1,...keys.map(k=>by[k].e));return `<section class="card"><h2>Loon per maand</h2><div class="miniChart">${keys.slice(-8).map(k=>`<div title="${k}" style="height:${Math.max(4,by[k].e/max*115)}px"></div>`).join('')}</div></section><div class="list">${keys.reverse().map(k=>`<div class="item"><div class="itemTop"><div><h3>${k}</h3><div class="meta">${num(by[k].h)} uur</div></div><div class="amount">${eur(by[k].e)}</div></div></div>`).join('')||'<div class="card empty">Nog geen statistieken.</div>'}</div><section class="card"><h2>Instellingen</h2><label>Standaard uurloon</label><input id="setRate" type="number" step="0.01" value="${state.settings.rate}"><label>Werkgever</label><input id="setEmployer" value="${esc(state.settings.employer)}"><div style="height:12px"></div><button id="saveSettings">Instellingen opslaan</button></section>`}
function bindPage(){if($('saveSettings'))$('saveSettings').onclick=()=>{state.settings.rate=+$('setRate').value||0;state.settings.employer=$('setEmployer').value||'Werk';render()}}
function fieldForm(obj,type){return `<div class="row"><div><label>Datum</label><input id="fDate" type="date" value="${obj.date||today()}"></div><div><label>Werkgever</label><input id="fEmployer" value="${esc(obj.employer||state.settings.employer)}"></div></div><div class="row"><div><label>Start</label><input id="fStart" type="time" value="${obj.start||'09:00'}"></div><div><label>Einde</label><input id="fEnd" type="time" value="${obj.end||'17:00'}"></div></div>${type==='shift'?`<div class="row"><div><label>Pauze min.</label><input id="fBreak" type="number" value="${obj.breakMin||0}"></div><div><label>Uurloon</label><input id="fRate" type="number" step="0.01" value="${obj.rate||state.settings.rate}"></div></div>`:''}<label>Notitie</label><textarea id="fNote" rows="3">${esc(obj.note||'')}</textarea>`}
function openModal(title,body,saveText,onSave){$('modalRoot').innerHTML=`<div class="modal"><div class="sheet"><div class="sheetHead"><h2>${title}</h2><button class="ghost" onclick="closeModal()">Sluit</button></div><div class="card">${body}<div style="height:14px"></div><button id="modalSave">${saveText}</button></div></div></div>`;$('modalSave').onclick=onSave}
function closeModal(){$('modalRoot').innerHTML=''}
function openPlan(date=today(),id=null){let p=id?state.plans.find(x=>x.id===id):{date};openModal(id?'Dag aanpassen':'Dag toevoegen',fieldForm(p,'plan'),id?'Opslaan':'Toevoegen',()=>{let o={id:id||uid(),date:$('fDate').value,start:$('fStart').value,end:$('fEnd').value,employer:$('fEmployer').value,note:$('fNote').value};if(!o.date||!o.start||!o.end)return alert('Vul datum, start en einde in.'); if(id)Object.assign(p,o); else state.plans.push(o); closeModal();render()})}
function openShift(id=null){let s=id?state.shifts.find(x=>x.id===id):{date:today(),breakMin:0,rate:state.settings.rate,employer:state.settings.employer};openModal(id?'Gewerkte shift aanpassen':'Shift toevoegen',fieldForm(s,'shift'),id?'Opslaan':'Toevoegen',()=>{let o={id:id||uid(),date:$('fDate').value,start:$('fStart').value,end:$('fEnd').value,breakMin:+$('fBreak').value||0,rate:+$('fRate').value||0,employer:$('fEmployer').value,note:$('fNote').value};if(!o.date||!o.start||!o.end)return alert('Vul datum, start en einde in.'); if(id)Object.assign(s,o); else state.shifts.push(o); closeModal();render()})}
function openPayment(id=null){let p=id?state.payments.find(x=>x.id===id):{date:today()};openModal(id?'Betaling aanpassen':'Betaling toevoegen',`<label>Datum</label><input id="pDate" type="date" value="${p.date||today()}"><label>Bedrag</label><input id="pAmount" type="number" step="0.01" value="${p.amount||''}"><label>Omschrijving</label><input id="pNote" value="${esc(p.note||'')}">`,id?'Opslaan':'Toevoegen',()=>{let o={id:id||uid(),date:$('pDate').value,amount:+$('pAmount').value||0,note:$('pNote').value}; if(!o.date||!o.amount)return alert('Vul datum en bedrag in.'); if(id)Object.assign(p,o); else state.payments.push(o); closeModal();render()})}
function delPlan(id){if(confirm('Geplande dag verwijderen?')){state.plans=state.plans.filter(x=>x.id!==id);render()}}function delShift(id){if(confirm('Gewerkte shift verwijderen?')){state.shifts=state.shifts.filter(x=>x.id!==id);render()}}function delPayment(id){if(confirm('Betaling verwijderen?')){state.payments=state.payments.filter(x=>x.id!==id);render()}}
function startPlan(id){let p=state.plans.find(x=>x.id===id);state.active={planId:id,startedAt:Date.now(),date:p.date,employer:p.employer,note:p.note,rate:state.settings.rate};page='home';render()}
function finishActive(){let a=state.active, now=new Date(), start=new Date(a.startedAt);let s={id:uid(),date:a.date||today(),start:start.toTimeString().slice(0,5),end:now.toTimeString().slice(0,5),breakMin:0,rate:a.rate,employer:a.employer,note:a.note||'gestart via timer'};state.shifts.push(s);if(a.planId)state.plans=state.plans.filter(p=>p.id!==a.planId);state.active=null;page='shifts';render();openShift(s.id)}function cancelActive(){if(confirm('Lopende shift annuleren?')){state.active=null;render()}}
$('fab').onclick=()=>{if(page==='planning')openPlan();else if(page==='pay')openPayment();else openShift()};$('backupBtn').onclick=()=>openModal('Backup',`<div class="quickgrid"><button id="exJson" class="secondary">Export JSON</button><button id="exCsv" class="secondary">Export CSV</button></div><label>Import JSON</label><input id="importFile" type="file" accept="application/json"><div style="height:10px"></div><button class="danger" id="resetApp">Reset app</button>`,'Klaar',closeModal);
document.addEventListener('click',e=>{if(e.target.id==='exJson'){let blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});download(blob,'worktracker-backup.json')}if(e.target.id==='exCsv'){let rows=['datum,start,einde,pauze_min,uurloon,uren,loon,werkgever,notitie',...state.shifts.map(s=>[s.date,s.start,s.end,s.breakMin||0,s.rate||0,num(hours(s)),num(money(s)),s.employer||'',(s.note||'').replaceAll(',',' ')].join(','))];download(new Blob([rows.join('\n')],{type:'text/csv'}),'worktracker-shifts.csv')}if(e.target.id==='resetApp'&&confirm('Alles resetten naar startdata?')){state=fresh();closeModal();render()}});
document.addEventListener('change',e=>{if(e.target.id==='importFile'){let f=e.target.files[0];if(!f)return;let r=new FileReader();r.onload=()=>{try{state=JSON.parse(r.result);closeModal();render()}catch(err){alert('Import mislukt')}};r.readAsText(f)}});function download(blob,name){let a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click();URL.revokeObjectURL(a.href)}
if('serviceWorker'in navigator)navigator.serviceWorker.register('./service-worker.js').catch(()=>{});render();
</script></body></html>
